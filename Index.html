<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nayan – Particle Universe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

#overlay {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
pointer-events: none; z-index: 10;
}

#name-tag {
position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
color: #00e5ff; font-size: clamp(18px, 5vw, 32px);
font-family: ‘Courier New’, monospace;
letter-spacing: 0.4em; text-transform: uppercase;
text-shadow: 0 0 20px #00e5ff, 0 0 40px #0077ff;
z-index: 20; pointer-events: none;
animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
0%, 100% { opacity: 0.8; text-shadow: 0 0 20px #00e5ff, 0 0 40px #0077ff; }
50% { opacity: 1; text-shadow: 0 0 30px #00e5ff, 0 0 60px #0077ff, 0 0 80px #00aaff; }
}

#gesture-hint {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
color: rgba(0,229,255,0.6); font-size: 12px; letter-spacing: 0.15em;
z-index: 20; pointer-events: none; text-align: center;
transition: opacity 0.5s;
}

#cam-btn {
position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.4);
color: #00e5ff; padding: 10px 24px; border-radius: 30px;
font-size: 13px; letter-spacing: 0.2em; cursor: pointer; z-index: 20;
transition: all 0.3s;
}
#cam-btn:hover { background: rgba(0,229,255,0.25); box-shadow: 0 0 20px rgba(0,229,255,0.3); }

#cam-status {
position: fixed; top: 90px; right: 20px;
color: rgba(0,229,255,0.7); font-size: 11px; letter-spacing: 0.1em;
z-index: 20; pointer-events: none;
}

#video-feed {
position: fixed; bottom: 140px; right: 15px;
width: 100px; height: 75px; border-radius: 8px;
border: 1px solid rgba(0,229,255,0.3);
object-fit: cover; z-index: 20; display: none;
transform: scaleX(-1);
}

#hand-cursor {
position: fixed; width: 30px; height: 30px;
border: 2px solid rgba(0,229,255,0.8);
border-radius: 50%; pointer-events: none;
z-index: 30; display: none;
transform: translate(-50%, -50%);
box-shadow: 0 0 10px rgba(0,229,255,0.5);
transition: width 0.1s, height 0.1s;
}

.controls-info {
position: fixed; top: 50%; left: 15px; transform: translateY(-50%);
color: rgba(0,229,255,0.4); font-size: 10px; letter-spacing: 0.08em;
z-index: 20; pointer-events: none; line-height: 1.8;
}
</style>

</head>
<body>

<canvas id="main"></canvas>

<div id="name-tag">✦ Nayan ✦</div>
<div class="controls-info">
  🖱 DRAG → Rotate<br>
  🖱 WHEEL → Zoom<br>
  👋 HAND → Gesture<br>
  ✌ PINCH → Zoom
</div>
<div id="cam-status">CAM: OFF</div>
<video id="video-feed" autoplay playsinline muted></video>
<div id="hand-cursor"></div>
<button id="cam-btn">👋 Enable Hand Gestures</button>
<div id="gesture-hint">DRAG TO ROTATE · SCROLL TO ZOOM</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ─── SCENE SETUP ───────────────────────────────────────────────────────────
const canvas = document.getElementById('main');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 3.5;

// ─── STARFIELD ─────────────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starCount = 2000;
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) {
  starPositions[i] = (Math.random() - 0.5) * 80;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.04, transparent: true, opacity: 0.8 });
scene.add(new THREE.Points(starGeo, starMat));

// ─── BLUE DOT SPHERE ───────────────────────────────────────────────────────
const sphereGroup = new THREE.Group();
scene.add(sphereGroup);

const dotGeo = new THREE.BufferGeometry();
const dotPositions = [];
const dotColors = [];
const rows = 40, cols = 40;

for (let lat = 0; lat <= rows; lat++) {
  const theta = (lat / rows) * Math.PI;
  for (let lon = 0; lon <= cols; lon++) {
    const phi = (lon / cols) * 2 * Math.PI;
    const r = 1.0;
    dotPositions.push(
      r * Math.sin(theta) * Math.cos(phi),
      r * Math.cos(theta),
      r * Math.sin(theta) * Math.sin(phi)
    );
    // Blue color with slight variation
    const bright = 0.5 + 0.5 * Math.abs(Math.cos(theta));
    dotColors.push(0.1 * bright, 0.3 * bright, 1.0 * bright);
  }
}

dotGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dotPositions), 3));
dotGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(dotColors), 3));
const dotMat = new THREE.PointsMaterial({ size: 0.025, vertexColors: true, transparent: true, opacity: 0.9 });
const dotSphere = new THREE.Points(dotGeo, dotMat);
sphereGroup.add(dotSphere);

// Latitude/longitude lines
const lineMat = new THREE.LineBasicMaterial({ color: 0x1144ff, transparent: true, opacity: 0.3 });
for (let lat = 0; lat <= 10; lat++) {
  const theta = (lat / 10) * Math.PI;
  const pts = [];
  for (let i = 0; i <= 64; i++) {
    const phi = (i / 64) * 2 * Math.PI;
    pts.push(new THREE.Vector3(
      Math.sin(theta) * Math.cos(phi),
      Math.cos(theta),
      Math.sin(theta) * Math.sin(phi)
    ));
  }
  const lg = new THREE.BufferGeometry().setFromPoints(pts);
  sphereGroup.add(new THREE.Line(lg, lineMat));
}
for (let lon = 0; lon < 18; lon++) {
  const phi = (lon / 18) * 2 * Math.PI;
  const pts = [];
  for (let i = 0; i <= 64; i++) {
    const theta = (i / 64) * Math.PI;
    pts.push(new THREE.Vector3(
      Math.sin(theta) * Math.cos(phi),
      Math.cos(theta),
      Math.sin(theta) * Math.sin(phi)
    ));
  }
  const lg = new THREE.BufferGeometry().setFromPoints(pts);
  sphereGroup.add(new THREE.Line(lg, lineMat));
}

// ─── TEAL PARTICLE RING ────────────────────────────────────────────────────
const ringGroup = new THREE.Group();
scene.add(ringGroup);

const ringGeo = new THREE.BufferGeometry();
const ringPositions = [];
const ringColors = [];
const ringCount = 8000;

for (let i = 0; i < ringCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const spread = (Math.random() - 0.5) * 0.45;
  const radius = 1.65 + spread * 0.5;
  const tilt = (Math.random() - 0.5) * 0.3;
  ringPositions.push(
    radius * Math.cos(angle),
    tilt + spread * 0.3,
    radius * Math.sin(angle)
  );
  const t = 0.4 + Math.random() * 0.6;
  ringColors.push(0, t * 0.85, t * 0.75);
}

ringGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ringPositions), 3));
ringGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(ringColors), 3));
const ringMat = new THREE.PointsMaterial({ size: 0.012, vertexColors: true, transparent: true, opacity: 0.8 });
const ring = new THREE.Points(ringGeo, ringMat);
ring.rotation.x = 0.3;
ringGroup.add(ring);

// ─── CONSTELLATION LINES ───────────────────────────────────────────────────
const constellationGroup = new THREE.Group();
scene.add(constellationGroup);

function addConstellationLine(points) {
  const pts = points.map(p => new THREE.Vector3(...p));
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  const m = new THREE.LineBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.5 });
  constellationGroup.add(new THREE.Line(g, m));
  // dots at joints
  const dg = new THREE.BufferGeometry().setFromPoints(pts);
  const dm = new THREE.PointsMaterial({ color: 0x00ccff, size: 0.05 });
  constellationGroup.add(new THREE.Points(dg, dm));
}

addConstellationLine([[2.5, -0.5, -1], [2.8, 0.2, -1.2], [3.1, -0.3, -1.1], [2.9, 0.5, -0.8]]);
addConstellationLine([[-2.5, 0.8, -1.5], [-2.9, 0.2, -1.3], [-3.2, 0.6, -1.0]]);

// ─── INTERACTION ───────────────────────────────────────────────────────────
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotX = 0, rotY = 0;
let targetRotX = 0, targetRotY = 0;
let zoomLevel = 3.5;
let targetZoom = 3.5;

canvas.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  targetRotY += dx * 0.008;
  targetRotX += dy * 0.008;
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('wheel', e => {
  targetZoom = Math.max(1.5, Math.min(8, targetZoom + e.deltaY * 0.005));
});

// Touch
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
canvas.addEventListener('touchend', () => { isDragging = false; lastTouchDist = null; });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    targetRotY += dx * 0.008;
    targetRotX += dy * 0.008;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (lastTouchDist !== null) {
      targetZoom = Math.max(1.5, Math.min(8, targetZoom - (dist - lastTouchDist) * 0.01));
    }
    lastTouchDist = dist;
  }
}, { passive: true });

// ─── HAND GESTURE (MediaPipe via CDN) ──────────────────────────────────────
const camBtn = document.getElementById('cam-btn');
const camStatus = document.getElementById('cam-status');
const videoFeed = document.getElementById('video-feed');
const handCursor = document.getElementById('hand-cursor');
let handActive = false;
let prevHandX = null, prevHandY = null;
let prevPinchDist = null;

camBtn.addEventListener('click', async () => {
  if (handActive) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    videoFeed.srcObject = stream;
    videoFeed.style.display = 'block';
    handCursor.style.display = 'block';
    camStatus.textContent = 'CAM: ON — Loading AI...';
    camBtn.style.display = 'none';

    // Load MediaPipe Hands
    const script1 = document.createElement('script');
    script1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
    document.head.appendChild(script1);

    const script2 = document.createElement('script');
    script2.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';
    document.head.appendChild(script2);

    script2.onload = () => {
      const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
      hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });

      hands.onResults(results => {
        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
          prevHandX = null; prevHandY = null; prevPinchDist = null;
          handCursor.style.opacity = '0.3';
          return;
        }

        const lm = results.multiHandLandmarks[0];
        const wrist = lm[0];
        const indexTip = lm[8];
        const thumbTip = lm[4];
        const middleTip = lm[12];

        // Move cursor to index finger
        const cx = (1 - indexTip.x) * window.innerWidth;
        const cy = indexTip.y * window.innerHeight;
        handCursor.style.left = cx + 'px';
        handCursor.style.top = cy + 'px';
        handCursor.style.opacity = '1';

        // Detect pinch (thumb ↔ index) for ZOOM
        const pinchDx = thumbTip.x - indexTip.x;
        const pinchDy = thumbTip.y - indexTip.y;
        const pinchDist = Math.sqrt(pinchDx * pinchDx + pinchDy * pinchDy);

        if (prevPinchDist !== null) {
          const pinchDelta = pinchDist - prevPinchDist;
          targetZoom = Math.max(1.5, Math.min(8, targetZoom - pinchDelta * 15));
        }
        prevPinchDist = pinchDist;

        // Visual: pinching = smaller cursor
        const isPinching = pinchDist < 0.07;
        handCursor.style.width = isPinching ? '15px' : '30px';
        handCursor.style.height = isPinching ? '15px' : '30px';
        handCursor.style.background = isPinching ? 'rgba(0,229,255,0.4)' : 'transparent';

        // Detect fist (all fingers closed) for drag/rotate
        const indexBase = lm[5];
        const isOpen = indexTip.y < indexBase.y; // finger extended upward

        if (isOpen && prevHandX !== null) {
          const dxH = (1 - indexTip.x) - prevHandX;
          const dyH = indexTip.y - prevHandY;
          targetRotY -= dxH * 6;
          targetRotX += dyH * 6;
        }
        prevHandX = 1 - indexTip.x;
        prevHandY = indexTip.y;

        camStatus.textContent = isPinching ? 'PINCH: ZOOM 🤏' : isOpen ? 'HAND: ROTATE 🖐' : 'CAM: TRACKING';
      });

      const cam = new Camera(videoFeed, {
        onFrame: async () => { await hands.send({ image: videoFeed }); },
        width: 320, height: 240
      });
      cam.start();
      handActive = true;
      camStatus.textContent = 'CAM: ON ✓';
    };
  } catch (e) {
    camStatus.textContent = 'CAM: DENIED';
    camBtn.textContent = '⚠ Camera denied';
  }
});

// ─── ANIMATE ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth interpolation
  rotX += (targetRotX - rotX) * 0.08;
  rotY += (targetRotY - rotY) * 0.08;
  zoomLevel += (targetZoom - zoomLevel) * 0.08;
  camera.position.z = zoomLevel;

  // Auto slow rotation when not dragging
  if (!isDragging && !handActive) {
    targetRotY += 0.003;
  }

  sphereGroup.rotation.x = rotX;
  sphereGroup.rotation.y = rotY + t * 0.05;

  ring.rotation.y = t * 0.08;
  ringGroup.rotation.x = rotX * 0.3;
  ringGroup.rotation.y = rotY * 0.5;

  constellationGroup.rotation.y = t * 0.015;

  // Twinkle stars
  starMat.opacity = 0.6 + 0.2 * Math.sin(t * 0.7);

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>

</body>
</html>
